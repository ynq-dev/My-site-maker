<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Site! Maker V 1.2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700&family=DotGothic16&family=Roboto:wght@400;700&family=Playfair+Display:wght@400;700&family=Lobster&family=Cinzel:wght@400&family=Montserrat:wght@400;700&family=Poppins:wght@400;700&family=Yusei+Magic&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
--accent: #eb459e;
--panel: #111;
--glass: rgba(255, 255, 255, 0.05);
--text: #fff;
--bg: #000;
}
body, html {
margin: 0;
height: 100%;
font-family: 'Noto Sans JP', 'Inter', sans-serif;
background: var(--bg);
color: var(--text);
overflow: hidden;
}
.app-container { display: flex; height: 100vh; width: 100vw; transition: 0.3s; }
.editor-panel {
width: 440px;
background: var(--panel);
border-right: 1px solid rgba(255,255,255,0.1);
overflow-y: auto;
padding: 20px;
z-index: 2000;
flex-shrink: 0;
box-shadow: 10px 0 30px rgba(0,0,0,0.5);
position: relative;
transition: transform 0.3s ease;
}
.editor-panel::-webkit-scrollbar { width: 8px; }
.editor-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
.editor-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); height: 40px;
}
#help-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 5px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
#help-btn:hover { background: rgba(255,255,255,0.2); }
.generator-title { font-size: 20px; font-weight: bold; color: var(--accent); margin: 0; letter-spacing: 1px; }
.section { background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
h2 { font-size: 14px; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.field { margin-bottom: 12px; }
label { display: block; font-size: 13px; opacity: 0.8; margin-bottom: 5px; font-weight: bold; }
input[type="text"], input[type="number"], textarea, select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: var(--text); padding: 10px; border-radius: 8px; font-size: 14px; box-sizing: border-box; font-family: inherit; outline: none; }
input[type="text"]::placeholder, textarea::placeholder, input[type="number"]::placeholder { color: transparent; }
input[type="color"] { width: 100%; height: 40px; padding: 2px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: transparent; cursor: pointer; }
input[type="range"] { width: 100%; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.btn-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; background: rgba(255,255,255,0.1); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
.btn:disabled { background: rgba(255,255,255,0.05) !important; color: #888; cursor: not-allowed; }
.btn-primary { background: var(--accent) !important; color: #fff; text-shadow: none; }
.mode-active { background: var(--text) !important; color: var(--bg) !important; }
.preview-panel { flex: 1; position: relative; background: #080808; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#preview-wrapper { position: relative; transition: width 0.3s, height 0.3s; overflow: hidden; box-shadow: 0 0 20px var(--accent); background-color: var(--bg); background-size: cover; background-position: center; background-repeat: no-repeat; border: 2px dashed var(--accent); }
#preview-viewport { width: 1280px; height: 720px; position: absolute; left: 0; top: 0; background-color: transparent; }
.mobile-frame { border: 12px solid #222 !important; border-radius: 36px !important; box-sizing: content-box; box-shadow: 0 0 40px rgba(0,0,0,0.8) !important; }
#preview-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); z-index: 1; pointer-events: none; }
#effect-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 2; width: 100%; height: 100%; }
#elements-layer { position: absolute; inset: 0; z-index: 10; width: 100%; height: 100%; }
.draggable { position: absolute !important; z-index: 100; touch-action: none; display: flex; align-items: center; justify-content: center; transform: translate(0,0); box-sizing: border-box; min-width: 20px; min-height: 20px; }
.draggable:empty { border: 1px dashed rgba(255,255,255,0.3); }
.edit-move .draggable { outline: 1px dashed var(--accent); cursor: move !important; }
.edit-move .draggable::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.001); z-index: 9998; cursor: move; }
.edit-resize .draggable { outline: 2px solid #00ff00; cursor: nwse-resize !important; }
.edit-move .draggable *:not(.delete-btn), .edit-resize .draggable *:not(.delete-btn) { pointer-events: none !important; }
.delete-btn { position: absolute; top: -10px; right: -10px; background: #ff4444; border-radius: 50%; width: 28px; height: 28px; display: none; color: white; border: none; cursor: pointer; z-index: 10000; align-items: center; justify-content: center; font-size: 16px; pointer-events: auto !important; font-weight: bold; }
.draggable.selected .delete-btn, .draggable:hover .delete-btn { display: flex; }
.draggable.locked { pointer-events: none !important; opacity: 0.5; outline: none !important; }
.draggable .content, .draggable .content-wrap, .draggable .about-box, .draggable .btn-ui { pointer-events: auto; }
.about-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 16px; width: 100%; height: 100%; box-sizing: border-box; overflow: hidden; }
.about-header { font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; color: var(--accent); }
.rainbow-text .content, .rainbow-text marquee { background: linear-gradient(90deg, red, yellow, lime, aqua, blue, magenta, red); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: rainbow 3s linear infinite; display: inline-block; }
@keyframes rainbow { to { background-position: 200% center; } }
.cursor { display: inline-block; width: 0.5em; height: 1em; background: currentColor; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: text-bottom; }
@keyframes blink { 50% { opacity: 0; } }
.status-icon { width: 100%; height: 100%; border-radius: 50%; display: none; }
.status-online { display: block; background-color: #23a55a; }
.status-idle { display: block; background-color: transparent; box-shadow: inset -4px -3px 0 0 #f0b232; transform: translate(-10%, -10%); }
.status-dnd { display: block; background-color: #f23f43; }
.status-offline { display: block; background-color: transparent; border: 3px solid #80848e; box-sizing: border-box; }
.btn-ui { border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; text-decoration: none; width: 100%; height: 100%; box-sizing: border-box; color: #fff; }
.shape-round { border-radius: 50px; } .shape-square { border-radius: 8px; }
.project-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-weight: bold; font-size: 13px; }
.project-content { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.project-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; font-size: 11px; text-align: center; text-decoration: none; color: #fff; transition: 0.2s;}
.project-item:hover { background: rgba(255,255,255,0.2); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; }
.modal-box { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; width: 800px; max-width: 90%; max-height: 85vh; overflow-y: auto; }
.dc-img { width: 45px; height: 45px; border-radius: 8px; margin-right: 10px; object-fit: cover; background: #222; }
.particle { position: fixed; pointer-events: none; z-index: 10001; border-radius: 50%; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
@keyframes slide { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes rotateIn { from { transform: rotate(-90deg) scale(0.5); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
@keyframes popIn { from { transform: scale(0.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.anim-fadeIn { animation: fadeIn 0.8s ease forwards; }
.anim-bounce { animation: bounce 1.2s infinite; }
.anim-slide { animation: slide 0.6s ease-out forwards; }
.anim-rotateIn { animation: rotateIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.anim-popIn { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.layer-panel { max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 5px; }
.layer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 4px; border-radius: 6px; font-size: 13px; border: 1px solid transparent; cursor: pointer; }
.layer-item.active { border-color: var(--accent); background: rgba(255,255,255,0.1); }
.layer-item:hover { background: rgba(255,255,255,0.15); }
.layer-controls { display: flex; gap: 8px; }
.layer-controls button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 14px; opacity: 0.7; transition: 0.2s; padding: 0 4px; }
.layer-controls button:hover { opacity: 1; color: var(--accent); }
.test-content-container { position: relative; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 1px solid #333;}
.shortcut-hint { background: transparent; border: none; padding: 10px; text-align: center; margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.2); }
.shortcut-key { display: inline-block; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); padding: 2px 6px; border-radius: 4px; margin: 0 2px; font-family: monospace; }
#ctx-menu { display: none; position: fixed; z-index: 99999; background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 5px 0; min-width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
#ctx-menu div { padding: 10px 15px; font-size: 13px; cursor: pointer; color: #fff; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
#ctx-menu div:hover { background: var(--accent); }
.clock-analog { border-radius: 50%; border: 3px solid var(--accent); position: relative; box-sizing: border-box; }
.clock-analog::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; background:var(--accent); border-radius:50%; z-index:10; }
.clock-hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; background: var(--accent); border-radius: 4px; z-index: 5; }
#mobile-menu-btn { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 50000; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); align-items: center; justify-content: center; }
@media (max-width: 768px) {
  .app-container { flex-direction: column; }
  .editor-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transform: translateX(-100%); padding-bottom: 80px; }
  .editor-panel.open { transform: translateX(0); }
  .preview-panel { height: 100vh; width: 100vw; }
  #mobile-menu-btn { display: flex; }
}
</style>
</head>
<body class="edit-move">

<button id="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>

<div id="ctx-menu">
<div onclick="ctxCopy()"><i class="fas fa-copy"></i> コピー</div>
<div onclick="ctxFront()"><i class="fas fa-level-up-alt"></i> 最前面へ</div>
<div onclick="ctxLock()"><i class="fas fa-lock"></i> ロック/解除</div>
<div onclick="ctxDel()"><i class="fas fa-trash"></i> 削除</div>
</div>

<div id="test-view-overlay" class="modal-overlay" style="z-index: 25000;">
<div style="width:100%; height:100%; position:relative; display: flex; align-items: center; justify-content: center;">
<button onclick="closeTestView()" class="btn btn-primary" style="position:absolute; top:20px; right:20px; z-index:10001; padding: 12px 24px;">
<i class="fas fa-times"></i> テストビュー終了
</button>
<div id="test-content-container" class="test-content-container"></div>
</div>
</div>

<div class="app-container">
<div class="editor-panel" id="main-editor-panel">
<div class="editor-header">
<div id="help-btn" onclick="openHelp()"><i class="fas fa-info-circle"></i> ヘルプ</div>
<div class="generator-title">My Site! Maker V 1.2</div>
</div>

<div class="section">
<h2><i class="fas fa-layer-group"></i> ページ管理 (マルチページ)</h2>
<div class="field">
<label>現在編集中のページID</label>
<input type="number" id="g-current-page" value="1" min="1" oninput="switchEditorPage()">
</div>
<div style="font-size: 11px; color: rgba(255,255,255,0.5);">※ 配置したパーツは現在のページIDに属します。ボタンのアクションでページ切り替えが可能です。</div>
</div>

<div class="section">
<h2><i class="fas fa-undo"></i> 履歴管理 (Draggable)</h2>
<div class="btn-grid">
<button class="btn" onclick="genUndo()"><i class="fas fa-arrow-left"></i> 元に戻す</button>
<button class="btn" onclick="genRedo()"><i class="fas fa-arrow-right"></i> やり直す</button>
</div>
<div class="shortcut-hint">
<i class="fas fa-keyboard"></i> ショートカット: 
<span class="shortcut-key">Ctrl</span> + <span class="shortcut-key">Z</span> で元に戻す / <span class="shortcut-key">Ctrl</span> + <span class="shortcut-key">Y</span> でやり直し
</div>
</div>

<div class="section">
<h2><i class="fas fa-eye"></i> レスポンシブプレビュー</h2>
<div class="btn-grid">
<button class="btn mode-active" id="v-pc" onclick="setView('pc')"><i class="fas fa-desktop"></i> PC版</button>
<button class="btn" id="v-mobile" onclick="setView('mobile')"><i class="fas fa-mobile-alt"></i> スマホ版</button>
</div>
</div>

<div class="section">
<h2><i class="fas fa-cog"></i> 全体設定</h2>
<div class="btn-grid">
<button class="btn mode-active" id="m-move" onclick="setMode('move')"><i class="fas fa-arrows-alt"></i> 移動</button>
<button class="btn" id="m-resize" onclick="setMode('resize')"><i class="fas fa-expand-alt"></i> 拡大縮小</button>
</div>
<div class="field">
<label>グリッド吸着 (Grid Snapping)</label>
<select id="g-snap" onchange="updateSnap()">
<option value="1">吸着なし (1px)</option>
<option value="5">5px 単位</option>
<option value="10">10px 単位</option>
<option value="20">20px 単位</option>
</select>
</div>
<div class="field">
<label>Discord ID (Lanyard連携)</label>
<input type="text" id="g-discord-id" oninput="updateLanyardConfig()">
</div>
<div class="btn-grid">
<label style="font-size:13px; display:flex; align-items:center; gap:5px; cursor:pointer;">
<input type="checkbox" id="g-bg-toggle" checked onchange="toggleBG()"> 背景画像表示
</label>
<select id="eff-select" onchange="initParticles()">
<option value="none" selected>エフェクト: なし</option>
<option value="rain">雨 (Rain)</option>
<option value="snow">雪 (Snow)</option>
<option value="stars">星 (Stars)</option>
</select>
</div>
<div class="field">
<label>メディアアップロード</label>
<select id="media-target" style="margin-bottom: 5px;">
<option value="bg" selected>背景画像</option>
<option value="avatar">アバター画像</option>
<option value="bgm">BGM (MP3等)</option>
</select>
<input type="file" id="media-upload-input" onchange="processMediaUpload(event)">
</div>
<div class="btn-grid" style="margin-top: 15px;">
<button class="btn" onclick="openTestView()" style="background: rgba(255,255,255,0.2);"><i class="fas fa-play"></i> テスト実行</button>
<button class="btn btn-primary" id="zip-btn" onclick="buildAndDownloadZIP()"><i class="fas fa-file-archive"></i> ZIP書き出し</button>
</div>
</div>

<div class="section">
<h2><i class="fas fa-list"></i> レイヤー一覧</h2>
<div id="layer-list-panel" class="layer-panel"></div>
</div>

<div class="section">
<h2><i class="fas fa-plus-circle"></i> コンポーネント追加</h2>
<div class="btn-grid-4">
<button class="btn" onclick="addObj('text')">テキスト</button>
<button class="btn" onclick="addObj('typing')">タイピング</button>
<button class="btn" onclick="addObj('glass')">ガラス枠</button>
<button class="btn" onclick="addObj('about')">About枠</button>
<button class="btn" onclick="addObj('profile')">アバター</button>
<button class="btn" onclick="addObj('status-dot')">状態ドット</button>
<button class="btn" onclick="addObj('social')">SNS</button>
<button class="btn" onclick="triggerImgUpload()">画像配置</button>
<button class="btn" onclick="addObj('button')">ボタン</button>
<button class="btn" onclick="addObj('particle-btn')">パーティクル</button>
<button class="btn" onclick="addObj('projects')">PJ表</button>
<button class="btn" onclick="addObj('lanyard')">Lanyard</button>
<button class="btn" onclick="addObj('mute')">ミュート</button>
<button class="btn" onclick="addObj('youtube')">YouTube</button>
<button class="btn" onclick="addObj('marquee')">流れる文字</button>
<button class="btn" onclick="addObj('progress')">進捗バー</button>
<button class="btn" onclick="addObj('divider')">区切り線</button>
<button class="btn" onclick="addObj('badge')">バッジ</button>
<button class="btn" onclick="addObj('quote')">引用</button>
<button class="btn" onclick="addObj('clock')">時計</button>
<button class="btn" onclick="addObj('alert')">アラート</button>
<button class="btn" onclick="addObj('stars')">評価星</button>
<button class="btn" onclick="addObj('stats')">数値</button>
<button class="btn" onclick="addObj('code')">コード枠</button>
<button class="btn" onclick="addObj('neon')">ネオン枠</button>
<button class="btn" onclick="addObj('checkbox')">チェック</button>
<button class="btn" onclick="addObj('toggle')">トグル</button>
<button class="btn" onclick="addObj('sound-btn')">効果音</button>
</div>
<input type="file" id="img-upload-input" style="display:none" accept="image/*" onchange="processImgObjUpload(event)">
<input type="file" id="sound-upload-input" style="display:none" accept="audio/*" onchange="processSoundObjUpload(event)">
</div>

<div id="comp-editor" class="section" style="display:none; border: 2px solid var(--accent);">
<h2><i class="fas fa-edit"></i> 詳細編集</h2>
<div id="f-content" class="field"><label>表示テキスト / 内容</label><textarea id="e-text" oninput="updateElement()"></textarea></div>
<div id="f-projects" class="field" style="display:none;"><label>プロジェクト (名前,URL)</label><textarea id="e-projects" oninput="updateElement()" rows="3"></textarea></div>
<div class="field" id="f-url" style="display:none;"><label>リンクURL / Video ID</label><input type="text" id="e-url" oninput="updateElement()"></div>
<div class="field" id="f-icon" style="display:none;"><label>SimpleIcons名 (例: twitter)</label><input type="text" id="e-icon" oninput="updateElement()"></div>

<div id="opt-typing" style="display:none;">
<div class="field"><label>速度 (ms)</label><input type="number" id="e-spd" oninput="updateElement()"></div>
<div class="btn-grid">
<label style="font-size:13px; cursor:pointer;"><input type="checkbox" id="e-shake-on" onchange="updateElement()"> 揺れ</label>
<label style="font-size:13px; cursor:pointer;"><input type="checkbox" id="e-cursor" checked onchange="updateElement()"> カーソル</label>
</div>
</div>

<div id="opt-glass" style="display:none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
<label style="color:var(--accent);">ガラス設定</label>
<div class="field"><label>ぼかし (Blur)</label><input type="range" id="e-glass-blur" min="0" max="30" value="10" oninput="updateElement()"></div>
<div class="field"><label>彩度 (Sat)</label><input type="range" id="e-glass-sat" min="0" max="200" value="100" oninput="updateElement()"></div>
<div class="field"><label>コントラスト (Con)</label><input type="range" id="e-glass-con" min="0" max="200" value="100" oninput="updateElement()"></div>
</div>

<div id="opt-discord-status" style="display:none; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 8px;">
<label>ステータス手動設定</label>

<option value="auto" selected>自動</option>

<div id="help-modal" class="modal-overlay">
<div class="modal-box">
<h2 style="color:var(--accent); margin-bottom: 15px;"><i class="fas fa-book"></i> My Site! Maker マニュアル</h2>
<div id="help-content" style="font-size:14px; line-height:1.8; color:#eee; white-space:pre-wrap; height:500px; overflow-y:auto; border:1px solid rgba(255,255,255,0.1); padding:20px; background: #0a0a0a; border-radius: 8px;"></div>
<button class="btn btn-primary" style="width:100%; margin-top:20px; padding: 15px;" onclick="document.getElementById('help-modal').style.display='none'">閉じる</button>
</div>
</div>

<script>
let mode = 'move';
let currentScale = 1;
let manualZoom = 1;
let snapValue = 1;
let activeEl = null;
let activeCtxEl = null;
let bgm = null;
let isMuted = true;
let particles = [];
let imgCount = 0;
let genHistory = [];
let genRedoStack = [];
let exportCooldown = false;
let assets = { bg: '', avatar: '', bgm: '' };
let objAssets = {};
let typingIntervals = {};
let currentPage = 1;

const effCanvas = document.getElementById('effect-canvas');
const effCtx = effCanvas.getContext('2d');

const helpLines = [
"🌟 My Site! Maker V 1.2.0 完全ガイド 🌟",
"",
"プログラミングの知識は一切不要！",
"このツールを使えば、マウス操作だけでプロ顔負けのプロフィールサイトやジェネレーターを簡単に作成できます。",
"",
"📝 1. 基本的な使い方",
"・画面左側の「コンポーネント追加」から好きなパーツを選んでクリックします。",
"・プレビュー画面にパーツが現れるので、ドラッグして好きな場所に配置します。",
"・パーツをクリックすると、左側のパネルで色やテキスト、フォントなどを自由に変更できます。",
"",
"🔍 2. スマホ版とPC版の自動レスポンシブ",
"「レスポンシブプレビュー」でスマホ版・PC版を切り替えられます。背景画像は自動的に画面全体にフィットし、出力されたサイトはPCで16:9、スマホで9:16の画面に自動最適化（中央フォーカス）されます。",
"",
"⏰ 3. アクション（マルチページ機能）",
"「ページ管理」でページIDを切り替えながらパーツを配置できます。",
"ボタンや画像などの「クリック時アクション」に「ページ切り替え」を設定し、値を「2」などにすると、クリックした瞬間にページ2の要素がフワッと表示されます！",
"",
"✨ 4. フィルターと回転",
"すべての要素に対して、ぼかしやモノクロといった「CSSフィルター」や、角度をつける「回転」を適用できるようになりました。自由なデザインをお楽しみください。",
"",
"💾 5. 保存と公開",
"・ZIP書き出し: 完成したら「ZIP書き出し」ボタンを押してください。HTMLファイルと画像がセットになったZIPファイルがダウンロードされます。",
"",
"📜 ライセンス (MIT License)",
"Copyright (c) 2026 ynq3",
"本ソフトウェアはMITライセンスの元で提供されています。自由に複製、改変、配布が可能です。"
];
document.getElementById('help-content').innerText = helpLines.join("\n");

function toggleMobileMenu() {
document.getElementById('main-editor-panel').classList.toggle('open');
}

function openHelp() { document.getElementById('help-modal').style.display = 'flex'; }

function updateSnap() { snapValue = parseInt(document.getElementById('g-snap').value) || 1; }

function switchEditorPage() {
currentPage = parseInt(document.getElementById('g-current-page').value) || 1;
document.querySelectorAll('#elements-layer .draggable').forEach(el => {
const p = parseInt(el.dataset.page) || 1;
el.style.display = (p === currentPage && el.dataset.visible !== "false") ? 'flex' : 'none';
});
closeEditor();
}

function saveGenState() {
const html = document.getElementById('elements-layer').innerHTML;
if(genHistory.length > 0 && genHistory[genHistory.length - 1] === html) return;
genHistory.push(html);
genRedoStack = [];
renderLayerPanel();
}
function genUndo() { if(genHistory.length > 1) { genRedoStack.push(genHistory.pop()); restoreGenState(genHistory[genHistory.length - 1]); } }
function genRedo() { if(genRedoStack.length > 0) { const html = genRedoStack.pop(); genHistory.push(html); restoreGenState(html); } }
function restoreGenState(html) {
document.getElementById('elements-layer').innerHTML = html;
document.querySelectorAll('.draggable').forEach(el => {
setupInteract(el);
if(el.dataset.type === 'typing') runTypingLive(el);
});
switchEditorPage();
renderLayerPanel();
}

window.addEventListener('keydown', (e) => {
if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); genUndo(); }
if (e.ctrlKey && e.key.toLowerCase() === 'y') { e.preventDefault(); genRedo(); }
if (e.ctrlKey && e.key.toLowerCase() === 'c') { if(activeEl && mode === 'move') { window.copiedElData = activeEl.outerHTML; } }
if (e.ctrlKey && e.key.toLowerCase() === 'v') {
if(window.copiedElData) {
const temp = document.createElement('div'); temp.innerHTML = window.copiedElData;
const clone = temp.firstChild; clone.id = "elem_" + Date.now() + Math.floor(Math.random()*100);
clone.dataset.customName = clone.dataset.type.toUpperCase() + " " + clone.id.substr(-4);
let nx = (parseFloat(clone.dataset.x) || 0) + 20; let ny = (parseFloat(clone.dataset.y) || 0) + 20;
clone.style.transform = `translate(${nx}px, ${ny}px)`; clone.dataset.x = nx; clone.dataset.y = ny;
clone.dataset.page = currentPage;
clone.classList.remove('selected'); document.getElementById('elements-layer').appendChild(clone);
setupInteract(clone); if(clone.dataset.type === 'typing') runTypingLive(clone); saveGenState();
switchEditorPage();
}
}
});

document.getElementById('pv-area').addEventListener('wheel', (e) => {
if(e.ctrlKey || e.metaKey) {
e.preventDefault();
manualZoom += e.deltaY * -0.002;
manualZoom = Math.min(Math.max(0.2, manualZoom), 4);
document.getElementById('preview-wrapper').style.transform = `scale(${currentScale * manualZoom})`;
}
}, {passive: false});

document.addEventListener('contextmenu', (e) => {
const el = e.target.closest('.draggable');
if(el && mode === 'move') {
e.preventDefault();
activeCtxEl = el;
const menu = document.getElementById('ctx-menu');
menu.style.display = 'block';
menu.style.left = e.clientX + 'px';
menu.style.top = e.clientY + 'px';
} else {
document.getElementById('ctx-menu').style.display = 'none';
}
});
document.addEventListener('click', (e) => {
if(!e.target.closest('#ctx-menu')) document.getElementById('ctx-menu').style.display = 'none';
});

function ctxCopy() { if(activeCtxEl) { window.copiedElData = activeCtxEl.outerHTML; } }
function ctxFront() { if(activeCtxEl) { let max = 0; document.querySelectorAll('.draggable').forEach(d => { let z = parseInt(d.style.zIndex||100); if(z>max) max=z; }); activeCtxEl.style.zIndex = max + 1; saveGenState(); } }
function ctxLock() { if(activeCtxEl) { const l = activeCtxEl.dataset.locked === "true"; activeCtxEl.dataset.locked = l ? "false" : "true"; activeCtxEl.classList.toggle('locked', !l); saveGenState(); } }
function ctxDel() { if(activeCtxEl) { removeObj(activeCtxEl); } }

window.onload = () => { resizeCanvas(); setTimeout(() => { saveGenState(); animateEffects(); }, 500); };

function resizeCanvas() {
const pvArea = document.getElementById('pv-area');
const wrapper = document.getElementById('preview-wrapper');
const viewport = document.getElementById('preview-viewport');
const isMobile = wrapper.classList.contains('mobile-frame');

let targetW = isMobile ? 405 : 1280;
let targetH = 720;

const scaleX = (pvArea.clientWidth - 40) / targetW;
const scaleY = (pvArea.clientHeight - 40) / targetH;
currentScale = Math.max(0.1, Math.min(scaleX, scaleY));

wrapper.style.width = targetW + 'px';
wrapper.style.height = targetH + 'px';
wrapper.style.transform = `scale(${currentScale * manualZoom})`;

if (isMobile) {
viewport.style.left = '50%';
viewport.style.marginLeft = '-640px';
} else {
viewport.style.left = '0';
viewport.style.marginLeft = '0';
}

const eff = document.getElementById('effect-canvas');
eff.width = targetW;
eff.height = targetH;
}
window.onresize = resizeCanvas;

function setMode(m) {
mode = m; document.body.className = document.body.className.replace(/edit-\w+/g, ''); document.body.classList.add(`edit-${m}`);
['m-move','m-resize'].forEach(id => document.getElementById(id).classList.remove('mode-active'));
document.getElementById(`m-${m}`).classList.add('mode-active');
if(activeEl) openEditor(activeEl);
}

function setView(v) {
const wrapper = document.getElementById('preview-wrapper');
if(v === 'mobile') wrapper.classList.add('mobile-frame'); else wrapper.classList.remove('mobile-frame');
['v-pc', 'v-mobile'].forEach(id => document.getElementById(id).classList.remove('mode-active'));
document.getElementById(`v-${v}`).classList.add('mode-active');
manualZoom = 1; resizeCanvas();
}

function toggleBG() { const wp = document.getElementById('preview-wrapper'); if(!document.getElementById('g-bg-toggle').checked) { wp.style.backgroundImage = 'none'; } else if (assets.bg) { wp.style.backgroundImage = `url(${assets.bg})`; } }

const dropZone = document.getElementById('pv-area');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.boxShadow = 'inset 0 0 50px var(--accent)'; });
dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.boxShadow = 'none'; });
dropZone.addEventListener('drop', (e) => {
e.preventDefault(); dropZone.style.boxShadow = 'none';
if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
const file = e.dataTransfer.files[0];
if(file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = (ev) => {
const res = ev.target.result; const fname = "img_" + Date.now() + "." + file.name.split('.').pop(); objAssets[fname] = res;
const rect = document.getElementById('preview-viewport').getBoundingClientRect();
let dropX = (e.clientX - rect.left) / (currentScale * manualZoom); let dropY = (e.clientY - rect.top) / (currentScale * manualZoom);
addObj('image', dropY, dropX, res, fname);
}; reader.readAsDataURL(file);
}
}
});

function processMediaUpload(e) {
const file = e.target.files[0]; if(!file) return;
const reader = new FileReader(); const target = document.getElementById('media-target').value;
reader.onload = (ev) => {
const data = ev.target.result; assets[target] = data;
if(target === 'bg') { if(document.getElementById('g-bg-toggle').checked) { document.getElementById('preview-wrapper').style.backgroundImage = `url(${data})`; } }
else if(target === 'avatar') { document.querySelectorAll('[data-type="profile"] .c-img').forEach(img => { img.src = data; img.style.display = 'block'; }); }
else if(target === 'bgm') {
if(bgm) bgm.pause(); bgm = new Audio(data); bgm.loop = true; bgm.muted = isMuted;
addObj('mute', 20, 20);
}
document.getElementById('media-upload-input').value = "";
}; reader.readAsDataURL(file);
}

function triggerImgUpload() { document.getElementById('img-upload-input').click(); }
function processImgObjUpload(e) {
const file = e.target.files[0]; if(!file) return;
const reader = new FileReader();
reader.onload = (ev) => { const res = ev.target.result; const fname = "img_" + Date.now() + "." + file.name.split('.').pop(); objAssets[fname] = res; addObj('image', 300, 500, res, fname); document.getElementById('img-upload-input').value = ""; };
reader.readAsDataURL(file);
}

function processSoundObjUpload(e) {
const file = e.target.files[0]; if(!file) return;
const reader = new FileReader();
reader.onload = (ev) => {
const res = ev.target.result; const fname = "snd_" + Date.now() + "." + file.name.split('.').pop(); objAssets[fname] = res;
if(activeEl) { activeEl.dataset.soundAsset = fname; document.getElementById('e-action-val').value = fname; updateElement(); }
document.getElementById('sound-upload-input').value = "";
};
reader.readAsDataURL(file);
}

function toggleMuteAction(btn, forceEvent) {
if(forceEvent) forceEvent.stopPropagation(); if(!bgm) return;
isMuted = !isMuted; bgm.muted = isMuted; if(!isMuted) bgm.play().catch(()=>{});
document.querySelectorAll('[data-type="mute"] button').forEach(b => { b.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; b.style.background = isMuted ? 'rgba(0,0,0,0.7)' : 'var(--accent)'; });
}

function triggerParticles(e, forceEvent) {
if(forceEvent) forceEvent.stopPropagation(); const rect = e.target.getBoundingClientRect(); const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2;
for(let i=0; i<25; i++) {
const p = document.createElement('div'); p.className = 'particle'; p.style.cssText = `width:6px; height:6px; background:var(--accent); left:${cx}px; top:${cy}px;`; document.body.appendChild(p);
const a = Math.random() * Math.PI * 2; const s = Math.random() * 8 + 3; let vx = Math.cos(a)*s, vy = Math.sin(a)*s, l = 1;
const anim = setInterval(() => { p.style.left = (parseFloat(p.style.left) + vx) + 'px'; p.style.top = (parseFloat(p.style.top) + vy) + 'px'; vy += 0.2; p.style.opacity = (l -= 0.03); if(l <= 0) { clearInterval(anim); p.remove(); } }, 20);
}
}

function playSoundAction(assetName) {
if(objAssets[assetName]) { const a = new Audio(objAssets[assetName]); a.play().catch(()=>{}); }
}

function addObj(type, top=100, left=300, val='', assetName='') {
if(type==='image' && imgCount >= 15) return;
if(type==='image') imgCount++;

const div = document.createElement('div');
div.className = 'draggable'; div.dataset.type = type; div.style.top = top + 'px'; div.style.left = left + 'px';
div.dataset.x = 0; div.dataset.y = 0; div.dataset.delay = ""; div.dataset.target = ""; div.dataset.actionType = "none"; div.dataset.actionVal = ""; div.dataset.page = currentPage; div.dataset.rot = "0";
div.id = "elem_" + Date.now() + Math.floor(Math.random()*100); div.dataset.locked = "false"; div.dataset.visible = "true";
div.dataset.customName = type.toUpperCase() + " " + div.id.substr(-4);
div.style.width = '200px'; div.style.height = '60px';

div.innerHTML = `<button class="delete-btn" onclick="removeObj(this.parentElement, event)">×</button>`;
let inner = '';

if(type==='text') { inner = `<div class="content" style="font-size:24px; font-weight:bold; width:100%; height:100%; display:flex; align-items:center; justify-content:center; text-align:center;"></div>`; }
else if(type==='typing') { div.dataset.text = ""; div.dataset.spd = "110"; inner = `<div class="content-wrap" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"><div class="content" style="font-size:24px; font-weight:700; font-family:'JetBrains Mono'; text-align:center; white-space:pre-wrap;"></div></div>`; }
else if(type==='glass') { div.style.width='300px'; div.style.height='200px'; inner = `<div class="content" style="width:100%; height:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.2); border-radius:16px; backdrop-filter: blur(10px) saturate(100%) contrast(100%);"></div>`; }
else if(type==='about') { div.style.width='300px'; div.style.height='120px'; inner = `<div class="about-box content"><div class="about-header"></div><div class="inner-text" style="font-size:15px;"></div></div>`; }
else if(type==='button') { div.dataset.url = '#'; div.style.width='150px'; div.style.height='50px'; inner = `<a href="${div.dataset.url}" onclick="return false;" class="btn-ui shape-round content" style="background:var(--accent); font-size:18px;"></a>`; }
else if(type==='particle-btn') { div.style.width='150px'; div.style.height='50px'; inner = `<button class="btn-ui shape-round content particle-trigger" style="background:var(--accent); font-size:18px;"></button>`; }
else if(type==='mute') { div.style.width='60px'; div.style.height='60px'; inner = `<button class="content mute-trigger" style="width:100%; height:100%; border-radius:50%; border:none; background:rgba(0,0,0,0.7); color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center;"><i class="fas fa-volume-mute"></i></button>`; }

function setupInteract(el) {

}
});
interact(el).draggable({
listeners: {
start(e) { if(mode !== 'move' || el.dataset.locked === "true") return false; },
move(e) { if(mode !== 'move' || el.dataset.locked === "true") return; let rawX = (parseFloat(el.dataset.x) || 0) + (e.dx / (currentScale * manualZoom)); let rawY = (parseFloat(el.dataset.y) || 0) + (e.dy / (currentScale * manualZoom)); let x = Math.round(rawX / snapValue) * snapValue; let y = Math.round(rawY / snapValue) * snapValue; el.style.transform = `translate(${x}px, ${y}px)`; el.dataset.x = x; el.dataset.y = y; },
end() { saveGenState(); }
}
}).resizable({
edges: { left:true, right:true, bottom:true, top:true }, modifiers: [ interact.modifiers.restrictSize({ min: { width: 20, height: 20 } }), ...(isAspectLocked ? [interact.modifiers.aspectRatio({ ratio: 'preserve' })] : []) ],
listeners: {
start(e) { if(mode !== 'resize' || el.dataset.locked === "true") return false; },
move(e) {

el.style.width = (e.rect.width / (currentScale * manualZoom)) + 'px'; el.style.height = (e.rect.height / (currentScale * manualZoom)) + 'px';
const c = el.querySelector('.content') || el.querySelector('.content-wrap'); if(c && (['text', 'typing', 'button', 'marquee', 'particle-btn'].includes(type))) { c.style.fontSize = Math.max(1, (e.rect.height / (currentScale * manualZoom)) * 0.45) + 'px'; }

},

}
});
}

function updateElement() {
